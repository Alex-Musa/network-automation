---
- name: Full Network Deployment
  hosts: cisco
  gather_facts: no

  vars:
    loop_ip: "1.1.1.{{ inventory_hostname[-1] }}"
    asn_map:
      R1: 65001
      R2: 65002
      R3: 65003
      R4: 65004

  tasks:

    #################################################################
    # LOOPBACK
    #################################################################

    - name: Pre-check Loopback1
      cisco.ios.ios_command:
        commands:
          - show ip interface brief | include Loopback1
      register: loop_pre

    - name: Configure Loopback1 if missing
      cisco.ios.ios_config:
        parents: interface Loopback1
        lines:
          - ip address {{ loop_ip }} 255.255.255.255
      when: loop_pre.stdout[0] == ""

    - name: Post-check Loopback1
      cisco.ios.ios_command:
        commands:
          - show ip interface brief | include Loopback1
      register: loop_post

    - name: Validate Loopback1
      assert:
        that:
          - loop_post.stdout[0] != ""
        fail_msg: "Loopback1 failed!"
        success_msg: "Loopback1 OK"

    #################################################################
    # OSPF
    #################################################################

    - name: Pre-check OSPF
      cisco.ios.ios_command:
        commands:
          - show running-config | section router ospf
      register: ospf_pre

    - name: Configure OSPF if missing
      cisco.ios.ios_config:
        parents: router ospf 1
        lines:
          - router-id {{ loop_ip }}
          - network 10.0.1.0 0.0.0.255 area 0
          - network {{ loop_ip }} 0.0.0.0 area 0
      when: ospf_pre.stdout[0] == ""

    - name: Check OSPF neighbors
      cisco.ios.ios_command:
        commands:
          - show ip ospf neighbor
      register: ospf_neighbors

    - name: Validate OSPF
      assert:
        that:
          - ospf_neighbors.stdout[0] != ""
        fail_msg: "OSPF failed!"
        success_msg: "OSPF OK"

    #################################################################
    # BGP
    #################################################################

    - name: Pre-check BGP
      cisco.ios.ios_command:
        commands:
          - show running-config | section router bgp
      register: bgp_pre

    - name: Configure BGP if missing
      cisco.ios.ios_config:
        parents: "router bgp {{ asn_map[inventory_hostname] }}"
        lines:
          - bgp router-id {{ loop_ip }}
          - network {{ loop_ip }} mask 255.255.255.255
      when: bgp_pre.stdout[0] == ""

    - name: Configure BGP neighbors
      cisco.ios.ios_config:
        parents: "router bgp {{ asn_map[inventory_hostname] }}"
        lines:
          - "neighbor {{ hostvars[item].ansible_host }} remote-as {{ asn_map[item] }}"
          - "neighbor {{ hostvars[item].ansible_host }} update-source GigabitEthernet0/0"
      loop: "{{ groups['cisco'] }}"
      when: item != inventory_hostname

    #################################################################
    # WAIT FOR BGP (IMPORTANT)
    #################################################################

    - name: Wait for BGP convergence
      cisco.ios.ios_command:
        commands:
          - show ip bgp summary
      register: bgp_post
      retries: 6
      delay: 10
      until:
        - "'Idle' not in bgp_post.stdout[0]"
        - "'Active' not in bgp_post.stdout[0]"
        - "'Connect' not in bgp_post.stdout[0]"

    - name: Show BGP summary
      debug:
        var: bgp_post.stdout_lines

    #################################################################
    # VALIDATION
    #################################################################

    - name: Validate BGP neighbors
      assert:
        that:
          - "'Idle' not in bgp_post.stdout[0]"
          - "'Active' not in bgp_post.stdout[0]"
          - "'Connect' not in bgp_post.stdout[0]"
        fail_msg: "BGP NOT Established!"
        success_msg: "BGP Established"

    - name: Validate BGP prefixes
      assert:
        that:
          - bgp_post.stdout[0] is search("State/PfxRcd")
          - bgp_post.stdout[0] is search("[1-9]")
        fail_msg: "No BGP routes!"
        success_msg: "BGP routes OK"