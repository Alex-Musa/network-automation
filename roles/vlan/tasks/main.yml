---
- name: Ensure required variables exist
  assert:
    that:
      - site_base is defined
      - vlans is defined
    fail_msg: "Missing required variables (site_base or vlans)"

# DEBUG
- name: DEBUG site_base
  debug:
    var: site_base

- name: DEBUG vlans
  debug:
    var: vlans

# =========================
# VLAN Creation
# =========================
- name: Get existing VLANs
  cisco.ios.ios_command:
    commands:
      - show vlan brief
  register: vlan_output

- name: Extract existing VLAN IDs
  set_fact:
    existing_vlans: "{{ vlan_output.stdout[0] | regex_findall('^\\s*(\\d+)\\s', multiline=True) }}"

- name: Create only missing VLANs
  cisco.ios.ios_config:
    parents: "vlan {{ item.id }}"
    lines:
      - name {{ item.name }}
  loop: "{{ vlans }}"
  when: item.id|string not in existing_vlans

# =========================
# SVI Configuration
# =========================
- name: Ensure correct SVI configuration
  cisco.ios.ios_config:
    parents: "interface Vlan{{ item.id }}"
    lines:
      - description {{ item.name }}
      - ip address {{ site_base }}.{{ item.net_id }}.1 255.255.255.0
      - no shutdown
    match: line
    replace: line
  loop: "{{ vlans }}"

# =========================
# Validation
# =========================
- name: Refresh VLAN output after config
  cisco.ios.ios_command:
    commands:
      - show vlan brief
  register: vlan_output_after

- name: Extract VLAN text
  set_fact:
    vlan_text: "{{ vlan_output_after.stdout[0] }}"

- name: Validate VLANs exist
  assert:
    that:
      - item.id|string in vlan_text
    fail_msg: "VLAN {{ item.id }} NOT configured!"
    success_msg: "VLAN {{ item.id }} OK"
  loop: "{{ vlans }}"

# =========================
# DEBUG 
# =========================
- name: DEBUG calculated IPs
  debug:
    msg: "VLAN {{ item.id }} → {{ site_base }}.{{ item.net_id }}.1"
  loop: "{{ vlans }}"